<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rust WASM RPN Calculator</title>
  <style>
    :root {
      --bg-0: #0a0d14;
      --bg-1: #121826;
      --bg-2: #182133;
      --panel: rgba(22, 29, 44, 0.92);
      --panel-2: rgba(17, 22, 35, 0.92);
      --ink: #e6edf8;
      --muted: #8ea0bf;
      --accent: #63b6ff;
      --accent-2: #5ce3b6;
      --danger: #ff7f88;
      --key: #1b2438;
      --key-op: #1d3553;
      --key-fn: #1a3640;
      --key-danger: #432734;
      --border: #2b3a57;
      --glow: rgba(99, 182, 255, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Gill Sans", "Avenir Next", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 0%, #1b2a44 0%, transparent 40%),
        radial-gradient(circle at 88% 100%, #173041 0%, transparent 45%),
        linear-gradient(165deg, var(--bg-0) 0%, var(--bg-1) 55%, var(--bg-2) 100%);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 14px;
    }

    .panel {
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.45);
      padding: 14px;
      backdrop-filter: blur(2px);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .display {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--panel-2);
      min-height: 80px;
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    .entry {
      font-size: clamp(22px, 5.4vw, 28px);
      color: #f5fbff;
      line-height: 1.2;
      word-break: break-all;
      min-height: 32px;
      text-shadow: 0 0 10px rgba(99, 182, 255, 0.25);
    }

    .error {
      min-height: 20px;
      font-size: 13px;
      color: var(--danger);
    }

    .error.ok {
      color: transparent;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--key);
      color: var(--ink);
      font-size: clamp(13px, 2.5vw, 16px);
      min-height: clamp(38px, 9vw, 46px);
      cursor: pointer;
      transition: transform 90ms ease, filter 120ms ease, box-shadow 120ms ease;
    }

    button:hover {
      filter: brightness(1.08);
      box-shadow: 0 0 0 1px var(--glow);
    }

    button:active {
      transform: translateY(1px);
    }

    button.op {
      background: var(--key-op);
    }

    button.fn {
      background: var(--key-fn);
    }

    button.danger {
      background: var(--key-danger);
    }

    button.wide {
      grid-column: span 2;
    }

    .stack-title {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .stack {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 6px;
    }

    .stack li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-family: "Courier New", monospace;
      background: var(--panel-2);
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .stack .idx {
      color: var(--muted);
      min-width: 28px;
    }

    .stack li.top {
      border-color: #1f8f5e;
      background: linear-gradient(180deg, rgba(28, 95, 66, 0.35) 0%, rgba(20, 70, 50, 0.35) 100%);
      box-shadow: inset 0 0 0 1px rgba(127, 231, 173, 0.2);
    }

    .stack li.top .idx {
      color: #7fe7ad;
      font-weight: 700;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .matrix-tools {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: grid;
      gap: 10px;
    }

    .matrix-tools h3 {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .matrix-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .matrix-grid label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .matrix-grid textarea {
      width: 100%;
      min-height: 74px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: "Courier New", monospace;
      font-size: 12px;
      padding: 8px;
      color: var(--ink);
      background: var(--panel-2);
    }

    .matrix-actions {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .matrix-presets {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .matrix-presets .identity {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 8px;
      align-items: center;
      grid-column: span 2;
    }

    .matrix-presets input,
    .complex-tools input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      color: var(--ink);
      background: var(--panel-2);
      font-family: "Courier New", monospace;
      font-size: 13px;
    }

    .complex-tools {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .complex-tools h3 {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .complex-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
    }

    .memory-tools {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .memory-row {
      display: grid;
      grid-template-columns: 84px 1fr 1fr 1fr;
      gap: 8px;
    }

    .keypad-guide {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.01em;
    }

    .status-chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 10px;
      color: #cff2ff;
      background: rgba(99, 182, 255, 0.15);
      font-family: "Courier New", monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
    }

    @media (max-width: 1100px) {
      .app {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 10px;
      }

      .panel {
        padding: 10px;
      }

      button {
        min-height: 36px;
        font-size: 14px;
      }

      .keys {
        gap: 6px;
      }

      .matrix-grid {
        grid-template-columns: 1fr;
      }

      .matrix-actions {
        grid-template-columns: 1fr;
      }

      .matrix-presets {
        grid-template-columns: 1fr;
      }

      .matrix-presets .identity {
        grid-column: span 1;
      }

      .complex-row {
        grid-template-columns: 1fr;
      }

      .memory-row {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="status-row">
        <strong>Rust WASM RPN</strong>
        <span id="angle-indicator" class="status-chip">RAD</span>
      </div>
      <div class="display">
        <div id="entry-display" class="entry">0</div>
        <div id="error-display" class="error ok"></div>
      </div>
      <p class="keypad-guide">RPN flow: build number -> <code>Enter</code> -> apply operation.</p>

      <div class="keys" id="keypad">
        <button class="fn" data-action="set-rad">RAD</button>
        <button class="fn" data-action="set-deg">DEG</button>
        <button class="fn" data-action="drop">drop</button>
        <button class="fn" data-action="dup">dup</button>
        <button class="fn" data-action="swap">swap</button>

        <button class="danger" data-action="clear-entry">CE</button>
        <button class="danger" data-action="clear-all">C</button>
        <button class="op" data-action="mul">*</button>
        <button class="op" data-action="div">/</button>
        <button class="fn" data-action="rot">rot</button>

        <button class="fn" data-action="sin">sin</button>
        <button class="fn" data-action="ln">ln</button>
        <button class="fn" data-action="sqrt">sqrt</button>
        <button class="fn" data-action="backspace">back</button>
        <button class="fn" data-action="toggle-sign">+/-</button>

        <button data-digit="7">7</button>
        <button data-digit="8">8</button>
        <button data-digit="9">9</button>
        <button class="op" data-action="add">+</button>
        <button class="op" data-action="sub">-</button>

        <button data-digit="4">4</button>
        <button data-digit="5">5</button>
        <button data-digit="6">6</button>
        <button class="fn" data-action="det">det</button>
        <button class="fn" data-action="transpose">T</button>

        <button data-digit="1">1</button>
        <button data-digit="2">2</button>
        <button data-digit="3">3</button>
        <button class="fn" data-action="inverse">inv</button>
        <button class="fn" data-action="solve">solve</button>

        <button data-digit="0">0</button>
        <button data-action="decimal">.</button>
        <button class="op wide" data-action="enter">Enter</button>
        <button class="fn" data-action="push-identity">I(n)</button>
      </div>
    </section>

    <section class="panel">
      <h2 class="stack-title">Stack (Top First)</h2>
      <ol id="stack-list" class="stack"></ol>
      <section class="matrix-tools">
        <h3>Matrix Builder</h3>
        <div class="matrix-grid">
          <label>
            Matrix A
            <textarea id="matrix-a-input" placeholder="1 2&#10;3 4"></textarea>
          </label>
          <label>
            Matrix B
            <textarea id="matrix-b-input" placeholder="5&#10;6"></textarea>
          </label>
        </div>
        <div class="matrix-actions">
          <button class="fn" id="push-a-btn">Push A</button>
          <button class="fn" id="push-b-btn">Push B</button>
          <button class="op" id="solve-btn">Solve A*x=B</button>
        </div>
        <div class="matrix-presets">
          <button class="fn" id="preset-a-btn">Preset A 2x2</button>
          <button class="fn" id="preset-b-btn">Preset B vec</button>
          <div class="identity">
            <input id="identity-size-input" type="number" min="1" step="1" value="3" aria-label="Identity size">
            <button class="fn" id="push-identity-btn">Push I(n)</button>
          </div>
        </div>
      </section>
      <section class="complex-tools">
        <h3>Complex Entry</h3>
        <div class="complex-row">
          <input id="complex-re-input" type="number" step="any" value="0" aria-label="Complex real part">
          <input id="complex-im-input" type="number" step="any" value="1" aria-label="Complex imaginary part">
          <button class="fn" id="push-complex-btn">Push a+bi</button>
        </div>
      </section>
      <section class="complex-tools">
        <h3>Advanced Scientific</h3>
        <div class="matrix-actions" id="advanced-actions">
          <button class="fn" data-action="cos">cos</button>
          <button class="fn" data-action="tan">tan</button>
          <button class="fn" data-action="exp">exp</button>
          <button class="fn" data-action="log10">log10</button>
          <button class="fn" data-action="pow">pow</button>
          <button class="fn" data-action="percent">%</button>
          <button class="fn" data-action="asin">asin</button>
          <button class="fn" data-action="acos">acos</button>
          <button class="fn" data-action="atan">atan</button>
          <button class="fn" data-action="sinh">sinh</button>
          <button class="fn" data-action="cosh">cosh</button>
          <button class="fn" data-action="tanh">tanh</button>
          <button class="fn" data-action="asinh">asinh</button>
          <button class="fn" data-action="acosh">acosh</button>
          <button class="fn" data-action="atanh">atanh</button>
          <button class="fn" data-action="gamma">gamma</button>
          <button class="fn" data-action="erf">erf</button>
          <button class="fn" data-action="pi">pi</button>
          <button class="fn" data-action="e">e</button>
        </div>
      </section>
      <section class="memory-tools">
        <h3>Memory A-Z</h3>
        <div class="memory-row">
          <input id="memory-register-input" type="text" maxlength="1" value="A" aria-label="Memory register">
          <button class="fn" id="memory-store-btn">STO</button>
          <button class="fn" id="memory-recall-btn">RCL</button>
          <button class="danger" id="memory-clear-btn">CLR</button>
        </div>
      </section>
      <p class="hint" id="runtime-hint">
        Loading WASM runtime...
      </p>
    </section>
  </main>

  <script src="./pkg/webcalculator_backend.js"></script>
  <script src="./wasm_base64.js"></script>
  <script>
    const entryDisplay = document.getElementById("entry-display");
    const errorDisplay = document.getElementById("error-display");
    const angleIndicator = document.getElementById("angle-indicator");
    const stackList = document.getElementById("stack-list");
    const runtimeHint = document.getElementById("runtime-hint");
    const keypad = document.getElementById("keypad");
    const matrixAInput = document.getElementById("matrix-a-input");
    const matrixBInput = document.getElementById("matrix-b-input");
    const pushABtn = document.getElementById("push-a-btn");
    const pushBBtn = document.getElementById("push-b-btn");
    const solveBtn = document.getElementById("solve-btn");
    const presetABtn = document.getElementById("preset-a-btn");
    const presetBBtn = document.getElementById("preset-b-btn");
    const identitySizeInput = document.getElementById("identity-size-input");
    const pushIdentityBtn = document.getElementById("push-identity-btn");
    const complexReInput = document.getElementById("complex-re-input");
    const complexImInput = document.getElementById("complex-im-input");
    const pushComplexBtn = document.getElementById("push-complex-btn");
    const advancedActions = document.getElementById("advanced-actions");
    const memoryRegisterInput = document.getElementById("memory-register-input");
    const memoryStoreBtn = document.getElementById("memory-store-btn");
    const memoryRecallBtn = document.getElementById("memory-recall-btn");
    const memoryClearBtn = document.getElementById("memory-clear-btn");

    let wasmCalc = null;
    let entryBuffer = "";
    let lastState = null;
    let pendingCommand = null;

    function setError(message) {
      if (!message) {
        errorDisplay.textContent = "";
        errorDisplay.classList.add("ok");
        return;
      }
      errorDisplay.textContent = message;
      errorDisplay.classList.remove("ok");
    }

    function formatApiValue(value) {
      if (!value || !value.type) return "?";
      if (value.type === "real") return Number(value.value).toString();
      if (value.type === "complex") {
        const re = Number(value.re).toString();
        const im = Number(value.im).toString();
        return `${re} + ${im}i`;
      }
      if (value.type === "matrix") {
        return `${value.rows}x${value.cols} [${value.data.join(", ")}]`;
      }
      return JSON.stringify(value);
    }

    function renderState(state) {
      lastState = state;
      entryDisplay.textContent = state.entry_buffer || "0";
      angleIndicator.textContent = String(state.angle_mode || "rad").toUpperCase();
      stackList.innerHTML = "";
      const bottomFirst = [...(state.stack || [])];
      bottomFirst.forEach((value, idx) => {
        const li = document.createElement("li");
        if (idx === bottomFirst.length - 1) {
          li.classList.add("top");
        }
        const stackIndex = document.createElement("span");
        stackIndex.className = "idx";
        stackIndex.textContent = idx === bottomFirst.length - 1 ? "T" : `#${idx}`;
        const val = document.createElement("span");
        val.textContent = formatApiValue(value);
        li.append(stackIndex, val);
        stackList.append(li);
      });
      if (!bottomFirst.length) {
        const li = document.createElement("li");
        li.textContent = "(empty)";
        stackList.append(li);
      }
    }

    function parseResponse(jsonText) {
      try {
        return JSON.parse(jsonText);
      } catch (_) {
        return { ok: false, state: lastState || { stack: [], entry_buffer: "" }, error: { message: "invalid JSON from runtime" } };
      }
    }

    function decodeBase64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function call(methodName, ...args) {
      if (!wasmCalc || typeof wasmCalc[methodName] !== "function") {
        setError(`runtime method missing: ${methodName}`);
        return null;
      }
      const response = parseResponse(wasmCalc[methodName](...args));
      renderState(response.state);
      setError(response.ok ? "" : response.error?.message || "operation failed");
      return response;
    }

    function syncEntry() {
      call("entry_set", entryBuffer);
    }

    function commitEntryIfNeeded() {
      if (!entryBuffer.trim()) return true;
      const response = call("enter");
      if (!lastState) return false;
      if (!response || !response.ok) return false;
      entryBuffer = "";
      return true;
    }

    function parseMatrixText(rawText) {
      const rows = rawText
        .split(/\n+/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
      if (!rows.length) {
        return { error: "matrix input is empty" };
      }
      const parsedRows = rows.map((row) =>
        row
          .split(/[,\s]+/)
          .map((token) => token.trim())
          .filter((token) => token.length > 0)
      );
      const cols = parsedRows[0].length;
      if (!cols) {
        return { error: "matrix row cannot be empty" };
      }
      for (const row of parsedRows) {
        if (row.length !== cols) {
          return { error: "all matrix rows must have the same number of columns" };
        }
      }
      const data = [];
      for (const row of parsedRows) {
        for (const token of row) {
          const value = Number(token);
          if (!Number.isFinite(value)) {
            return { error: `invalid numeric value: ${token}` };
          }
          data.push(value);
        }
      }
      return {
        matrix: { rows: parsedRows.length, cols, data }
      };
    }

    function pushMatrixFromTextarea(textarea) {
      const parsed = parseMatrixText(textarea.value);
      if (parsed.error) {
        setError(parsed.error);
        return;
      }
      call("push_matrix_json", JSON.stringify(parsed.matrix));
    }

    function pushComplexFromInputs() {
      const re = Number(complexReInput.value);
      const im = Number(complexImInput.value);
      if (!Number.isFinite(re) || !Number.isFinite(im)) {
        setError("complex entry must contain valid numeric real and imaginary parts");
        return;
      }
      call("push_complex", re, im);
    }

    function pushIdentityFromInput() {
      const size = Number(identitySizeInput.value);
      if (!Number.isInteger(size) || size <= 0) {
        setError("identity size must be a positive integer");
        return;
      }
      call("push_identity", size);
    }

    function parseRegisterIndex() {
      const raw = String(memoryRegisterInput.value || "").trim().toUpperCase();
      if (!/^[A-Z]$/.test(raw)) {
        setError("memory register must be a single letter A-Z");
        return null;
      }
      return raw.charCodeAt(0) - 65;
    }

    function clearPendingCommand() {
      pendingCommand = null;
    }

    function beginPendingCommand(type) {
      pendingCommand = { type, digits: "" };
      setError("");
    }

    function executePendingCommand() {
      if (!pendingCommand) return;
      const amount = Number(pendingCommand.digits);
      if (!Number.isInteger(amount) || amount <= 0) {
        setError("hotkey expects a positive integer argument");
        clearPendingCommand();
        return;
      }
      if (!commitEntryIfNeeded()) {
        clearPendingCommand();
        return;
      }
      call(pendingCommand.type, amount);
      clearPendingCommand();
    }

    function handleAction(action) {
      if (!wasmCalc) return;
      if (action === "decimal") {
        if (!entryBuffer.includes(".")) entryBuffer = entryBuffer ? `${entryBuffer}.` : "0.";
        syncEntry();
        return;
      }
      if (action === "backspace") {
        entryBuffer = entryBuffer.slice(0, -1);
        syncEntry();
        return;
      }
      if (action === "toggle-sign") {
        if (entryBuffer.startsWith("-")) entryBuffer = entryBuffer.slice(1);
        else entryBuffer = entryBuffer ? `-${entryBuffer}` : "-";
        syncEntry();
        return;
      }
      if (action === "enter") {
        call("enter");
        entryBuffer = "";
        return;
      }
      if (action === "clear-entry") {
        entryBuffer = "";
        call("clear_entry");
        return;
      }
      if (action === "clear-all") {
        entryBuffer = "";
        call("clear_all");
        return;
      }

      if (action === "set-deg") {
        call("set_angle_mode_deg");
        return;
      }
      if (action === "set-rad") {
        call("set_angle_mode_rad");
        return;
      }
      if (action === "solve") {
        if (!commitEntryIfNeeded()) return;
        call("solve_ax_b");
        return;
      }
      if (action === "push-identity") {
        pushIdentityFromInput();
        return;
      }
      if (action === "pi") {
        call("push_pi");
        return;
      }
      if (action === "e") {
        call("push_e");
        return;
      }

      const opMap = {
        drop: "drop",
        dup: "dup",
        swap: "swap",
        rot: "rot",
        pow: "pow",
        percent: "percent",
        add: "add",
        sub: "sub",
        mul: "mul",
        div: "div",
        sqrt: "sqrt",
        ln: "ln",
        sin: "sin",
        cos: "cos",
        tan: "tan",
        asin: "asin",
        acos: "acos",
        atan: "atan",
        sinh: "sinh",
        cosh: "cosh",
        tanh: "tanh",
        asinh: "asinh",
        acosh: "acosh",
        atanh: "atanh",
        exp: "exp",
        log10: "log10",
        gamma: "gamma",
        erf: "erf",
        inverse: "inverse",
        transpose: "transpose",
        det: "determinant"
      };
      const method = opMap[action];
      if (!method) return;
      if (!commitEntryIfNeeded()) return;
      call(method);
    }

    keypad.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      const digit = button.dataset.digit;
      if (digit !== undefined) {
        entryBuffer += digit;
        syncEntry();
        return;
      }
      handleAction(button.dataset.action);
    });

    advancedActions.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      handleAction(button.dataset.action);
    });

    pushABtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      pushMatrixFromTextarea(matrixAInput);
    });

    pushBBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      pushMatrixFromTextarea(matrixBInput);
    });

    solveBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      handleAction("solve");
    });

    presetABtn.addEventListener("click", () => {
      matrixAInput.value = "1 2\n3 4";
      setError("");
    });

    presetBBtn.addEventListener("click", () => {
      matrixBInput.value = "5\n6";
      setError("");
    });

    pushIdentityBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      pushIdentityFromInput();
    });

    pushComplexBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      pushComplexFromInputs();
    });

    memoryStoreBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      const index = parseRegisterIndex();
      if (index === null) return;
      call("memory_store", index);
    });

    memoryRecallBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      const index = parseRegisterIndex();
      if (index === null) return;
      call("memory_recall", index);
    });

    memoryClearBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      const index = parseRegisterIndex();
      if (index === null) return;
      call("memory_clear", index);
    });

    window.addEventListener("keydown", (event) => {
      if (!wasmCalc) return;
      if (pendingCommand) {
        if (event.key >= "0" && event.key <= "9") {
          event.preventDefault();
          pendingCommand.digits += event.key;
          return;
        }
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          executePendingCommand();
          return;
        }
        if (event.key === "Escape") {
          event.preventDefault();
          clearPendingCommand();
          return;
        }
        clearPendingCommand();
      }
      if (event.key >= "0" && event.key <= "9") {
        entryBuffer += event.key;
        syncEntry();
        return;
      }
      if (event.key === "Delete") {
        event.preventDefault();
        if (!commitEntryIfNeeded()) return;
        call("drop");
        return;
      }
      if (event.key === "d" || event.key === "D") {
        event.preventDefault();
        if (!commitEntryIfNeeded()) return;
        call("dup");
        return;
      }
      if (event.key === "s" || event.key === "S") {
        event.preventDefault();
        if (!commitEntryIfNeeded()) return;
        call("swap");
        return;
      }
      if (event.key === "r" || event.key === "R") {
        event.preventDefault();
        beginPendingCommand("roll");
        return;
      }
      if (event.key === "p" || event.key === "P") {
        event.preventDefault();
        beginPendingCommand("pick");
        return;
      }
      if (event.key === ".") {
        handleAction("decimal");
        return;
      }
      if (event.key === "Backspace") {
        event.preventDefault();
        handleAction("backspace");
        return;
      }
      if (event.key === "Enter") {
        event.preventDefault();
        handleAction("enter");
        return;
      }
      const keyOps = { "+": "add", "-": "sub", "*": "mul", "/": "div" };
      if (keyOps[event.key]) {
        event.preventDefault();
        handleAction(keyOps[event.key]);
      }
    });

    async function boot() {
      try {
        if (typeof wasm_bindgen !== "function") {
          throw new Error("wasm_bindgen runtime is unavailable");
        }

        if (typeof window.__WASM_BASE64 === "string" && window.__WASM_BASE64.length > 0) {
          await wasm_bindgen(decodeBase64ToBytes(window.__WASM_BASE64));
        } else {
          await wasm_bindgen("./pkg/webcalculator_backend_bg.wasm");
        }

        wasmCalc = new wasm_bindgen.WasmCalculator();
        runtimeHint.textContent = "WASM runtime loaded.";
        const initial = JSON.parse(wasmCalc.snapshot_json());
        renderState(initial);
        setError("");
      } catch (error) {
        runtimeHint.textContent =
          "WASM runtime not found. Build with ./scripts/build_wasm.sh and open dist/index.html.";
        setError("runtime unavailable");
        console.error(error);
        for (const button of document.querySelectorAll("button")) {
          button.disabled = true;
        }
      }
    }

    boot();
  </script>
</body>
</html>
