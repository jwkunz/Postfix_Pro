<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rust WASM RPN Calculator</title>
  <style>
    :root {
      --bg: #f2efe6;
      --panel: #fffdf7;
      --ink: #1b1a17;
      --muted: #6c6558;
      --accent: #185a9d;
      --accent-2: #43cea2;
      --danger: #9d2424;
      --key: #f4f1e8;
      --key-op: #dce8f6;
      --key-fn: #deefe7;
      --key-danger: #f8dedb;
      --border: #d8d2c4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Gill Sans", "Avenir Next", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 0%, #ffffff 0%, #efe9dd 40%, #e6dfd0 100%);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 14px 36px rgba(27, 26, 23, 0.12);
      padding: 14px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .display {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      min-height: 80px;
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .entry {
      font-size: 26px;
      line-height: 1.2;
      word-break: break-all;
      min-height: 32px;
    }

    .error {
      min-height: 20px;
      font-size: 13px;
      color: var(--danger);
    }

    .error.ok {
      color: transparent;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    button {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--key);
      color: var(--ink);
      font-size: 16px;
      min-height: 44px;
      cursor: pointer;
      transition: transform 90ms ease, filter 120ms ease;
    }

    button:hover {
      filter: brightness(0.98);
    }

    button:active {
      transform: translateY(1px);
    }

    button.op {
      background: var(--key-op);
    }

    button.fn {
      background: var(--key-fn);
    }

    button.danger {
      background: var(--key-danger);
    }

    button.wide {
      grid-column: span 2;
    }

    .stack-title {
      margin: 0 0 8px;
      font-size: 16px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .stack {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 6px;
    }

    .stack li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-family: "Courier New", monospace;
      background: #fff;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .stack .idx {
      color: var(--muted);
      min-width: 28px;
    }

    .hint {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .matrix-tools {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: grid;
      gap: 10px;
    }

    .matrix-tools h3 {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .matrix-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr 1fr;
    }

    .matrix-grid label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .matrix-grid textarea {
      width: 100%;
      min-height: 74px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: "Courier New", monospace;
      font-size: 12px;
      padding: 8px;
      background: #fff;
    }

    .matrix-actions {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .matrix-presets {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .matrix-presets .identity {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 8px;
      align-items: center;
      grid-column: span 2;
    }

    .matrix-presets input,
    .complex-tools input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      background: #fff;
      font-family: "Courier New", monospace;
      font-size: 13px;
    }

    .complex-tools {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: grid;
      gap: 8px;
    }

    .complex-tools h3 {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .complex-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 8px;
    }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="status-row">
        <strong>Rust WASM RPN</strong>
        <span id="angle-indicator">RAD</span>
      </div>
      <div class="display">
        <div id="entry-display" class="entry">0</div>
        <div id="error-display" class="error ok"></div>
      </div>

      <div class="keys" id="keypad">
        <button class="fn" data-action="set-rad">RAD</button>
        <button class="fn" data-action="set-deg">DEG</button>
        <button class="fn" data-action="drop">drop</button>
        <button class="fn" data-action="dup">dup</button>
        <button class="fn" data-action="swap">swap</button>

        <button class="danger" data-action="clear-entry">CE</button>
        <button class="danger" data-action="clear-all">C</button>
        <button class="op" data-action="mul">*</button>
        <button class="op" data-action="div">/</button>
        <button class="fn" data-action="rot">rot</button>

        <button class="fn" data-action="sin">sin</button>
        <button class="fn" data-action="ln">ln</button>
        <button class="fn" data-action="sqrt">sqrt</button>
        <button class="fn" data-action="backspace">back</button>
        <button class="fn" data-action="toggle-sign">+/-</button>

        <button data-digit="7">7</button>
        <button data-digit="8">8</button>
        <button data-digit="9">9</button>
        <button class="op" data-action="add">+</button>
        <button class="op" data-action="sub">-</button>

        <button data-digit="4">4</button>
        <button data-digit="5">5</button>
        <button data-digit="6">6</button>
        <button class="fn" data-action="det">det</button>
        <button class="fn" data-action="transpose">T</button>

        <button data-digit="1">1</button>
        <button data-digit="2">2</button>
        <button data-digit="3">3</button>
        <button class="fn" data-action="inverse">inv</button>
        <button class="fn" data-action="solve">solve</button>

        <button data-digit="0">0</button>
        <button data-action="decimal">.</button>
        <button class="op wide" data-action="enter">Enter</button>
        <button class="fn" data-action="push-identity">I(n)</button>
      </div>
    </section>

    <section class="panel">
      <h2 class="stack-title">Stack (Top First)</h2>
      <ol id="stack-list" class="stack"></ol>
      <section class="matrix-tools">
        <h3>Matrix Builder</h3>
        <div class="matrix-grid">
          <label>
            Matrix A
            <textarea id="matrix-a-input" placeholder="1 2&#10;3 4"></textarea>
          </label>
          <label>
            Matrix B
            <textarea id="matrix-b-input" placeholder="5&#10;6"></textarea>
          </label>
        </div>
        <div class="matrix-actions">
          <button class="fn" id="push-a-btn">Push A</button>
          <button class="fn" id="push-b-btn">Push B</button>
          <button class="op" id="solve-btn">Solve A*x=B</button>
        </div>
        <div class="matrix-presets">
          <button class="fn" id="preset-a-btn">Preset A 2x2</button>
          <button class="fn" id="preset-b-btn">Preset B vec</button>
          <div class="identity">
            <input id="identity-size-input" type="number" min="1" step="1" value="3" aria-label="Identity size">
            <button class="fn" id="push-identity-btn">Push I(n)</button>
          </div>
        </div>
      </section>
      <section class="complex-tools">
        <h3>Complex Entry</h3>
        <div class="complex-row">
          <input id="complex-re-input" type="number" step="any" value="0" aria-label="Complex real part">
          <input id="complex-im-input" type="number" step="any" value="1" aria-label="Complex imaginary part">
          <button class="fn" id="push-complex-btn">Push a+bi</button>
        </div>
      </section>
      <p class="hint" id="runtime-hint">
        Loading WASM runtime...
      </p>
    </section>
  </main>

  <script src="./pkg/webcalculator_backend.js"></script>
  <script src="./wasm_base64.js"></script>
  <script>
    const entryDisplay = document.getElementById("entry-display");
    const errorDisplay = document.getElementById("error-display");
    const angleIndicator = document.getElementById("angle-indicator");
    const stackList = document.getElementById("stack-list");
    const runtimeHint = document.getElementById("runtime-hint");
    const keypad = document.getElementById("keypad");
    const matrixAInput = document.getElementById("matrix-a-input");
    const matrixBInput = document.getElementById("matrix-b-input");
    const pushABtn = document.getElementById("push-a-btn");
    const pushBBtn = document.getElementById("push-b-btn");
    const solveBtn = document.getElementById("solve-btn");
    const presetABtn = document.getElementById("preset-a-btn");
    const presetBBtn = document.getElementById("preset-b-btn");
    const identitySizeInput = document.getElementById("identity-size-input");
    const pushIdentityBtn = document.getElementById("push-identity-btn");
    const complexReInput = document.getElementById("complex-re-input");
    const complexImInput = document.getElementById("complex-im-input");
    const pushComplexBtn = document.getElementById("push-complex-btn");

    let wasmCalc = null;
    let entryBuffer = "";
    let lastState = null;

    function setError(message) {
      if (!message) {
        errorDisplay.textContent = "";
        errorDisplay.classList.add("ok");
        return;
      }
      errorDisplay.textContent = message;
      errorDisplay.classList.remove("ok");
    }

    function formatApiValue(value) {
      if (!value || !value.type) return "?";
      if (value.type === "real") return Number(value.value).toString();
      if (value.type === "complex") {
        const re = Number(value.re).toString();
        const im = Number(value.im).toString();
        return `${re} + ${im}i`;
      }
      if (value.type === "matrix") {
        return `${value.rows}x${value.cols} [${value.data.join(", ")}]`;
      }
      return JSON.stringify(value);
    }

    function renderState(state) {
      lastState = state;
      entryDisplay.textContent = state.entry_buffer || "0";
      angleIndicator.textContent = String(state.angle_mode || "rad").toUpperCase();
      stackList.innerHTML = "";
      const topFirst = [...(state.stack || [])].reverse();
      topFirst.forEach((value, idx) => {
        const li = document.createElement("li");
        const stackIndex = document.createElement("span");
        stackIndex.className = "idx";
        stackIndex.textContent = `#${idx}`;
        const val = document.createElement("span");
        val.textContent = formatApiValue(value);
        li.append(stackIndex, val);
        stackList.append(li);
      });
      if (!topFirst.length) {
        const li = document.createElement("li");
        li.textContent = "(empty)";
        stackList.append(li);
      }
    }

    function parseResponse(jsonText) {
      try {
        return JSON.parse(jsonText);
      } catch (_) {
        return { ok: false, state: lastState || { stack: [], entry_buffer: "" }, error: { message: "invalid JSON from runtime" } };
      }
    }

    function decodeBase64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) {
        bytes[i] = binary.charCodeAt(i);
      }
      return bytes;
    }

    function call(methodName, ...args) {
      if (!wasmCalc || typeof wasmCalc[methodName] !== "function") {
        setError(`runtime method missing: ${methodName}`);
        return null;
      }
      const response = parseResponse(wasmCalc[methodName](...args));
      renderState(response.state);
      setError(response.ok ? "" : response.error?.message || "operation failed");
      return response;
    }

    function syncEntry() {
      call("entry_set", entryBuffer);
    }

    function commitEntryIfNeeded() {
      if (!entryBuffer.trim()) return true;
      const response = call("enter");
      if (!lastState) return false;
      if (!response || !response.ok) return false;
      entryBuffer = "";
      return true;
    }

    function parseMatrixText(rawText) {
      const rows = rawText
        .split(/\n+/)
        .map((line) => line.trim())
        .filter((line) => line.length > 0);
      if (!rows.length) {
        return { error: "matrix input is empty" };
      }
      const parsedRows = rows.map((row) =>
        row
          .split(/[,\s]+/)
          .map((token) => token.trim())
          .filter((token) => token.length > 0)
      );
      const cols = parsedRows[0].length;
      if (!cols) {
        return { error: "matrix row cannot be empty" };
      }
      for (const row of parsedRows) {
        if (row.length !== cols) {
          return { error: "all matrix rows must have the same number of columns" };
        }
      }
      const data = [];
      for (const row of parsedRows) {
        for (const token of row) {
          const value = Number(token);
          if (!Number.isFinite(value)) {
            return { error: `invalid numeric value: ${token}` };
          }
          data.push(value);
        }
      }
      return {
        matrix: { rows: parsedRows.length, cols, data }
      };
    }

    function pushMatrixFromTextarea(textarea) {
      const parsed = parseMatrixText(textarea.value);
      if (parsed.error) {
        setError(parsed.error);
        return;
      }
      call("push_matrix_json", JSON.stringify(parsed.matrix));
    }

    function pushComplexFromInputs() {
      const re = Number(complexReInput.value);
      const im = Number(complexImInput.value);
      if (!Number.isFinite(re) || !Number.isFinite(im)) {
        setError("complex entry must contain valid numeric real and imaginary parts");
        return;
      }
      call("push_complex", re, im);
    }

    function pushIdentityFromInput() {
      const size = Number(identitySizeInput.value);
      if (!Number.isInteger(size) || size <= 0) {
        setError("identity size must be a positive integer");
        return;
      }
      call("push_identity", size);
    }

    function handleAction(action) {
      if (!wasmCalc) return;
      if (action === "decimal") {
        if (!entryBuffer.includes(".")) entryBuffer = entryBuffer ? `${entryBuffer}.` : "0.";
        syncEntry();
        return;
      }
      if (action === "backspace") {
        entryBuffer = entryBuffer.slice(0, -1);
        syncEntry();
        return;
      }
      if (action === "toggle-sign") {
        if (entryBuffer.startsWith("-")) entryBuffer = entryBuffer.slice(1);
        else entryBuffer = entryBuffer ? `-${entryBuffer}` : "-";
        syncEntry();
        return;
      }
      if (action === "enter") {
        call("enter");
        entryBuffer = "";
        return;
      }
      if (action === "clear-entry") {
        entryBuffer = "";
        call("clear_entry");
        return;
      }
      if (action === "clear-all") {
        entryBuffer = "";
        call("clear_all");
        return;
      }

      if (action === "set-deg") {
        call("set_angle_mode_deg");
        return;
      }
      if (action === "set-rad") {
        call("set_angle_mode_rad");
        return;
      }
      if (action === "solve") {
        if (!commitEntryIfNeeded()) return;
        call("solve_ax_b");
        return;
      }
      if (action === "push-identity") {
        pushIdentityFromInput();
        return;
      }

      const opMap = {
        drop: "drop",
        dup: "dup",
        swap: "swap",
        rot: "rot",
        add: "add",
        sub: "sub",
        mul: "mul",
        div: "div",
        sqrt: "sqrt",
        ln: "ln",
        sin: "sin",
        inverse: "inverse",
        transpose: "transpose",
        det: "determinant"
      };
      const method = opMap[action];
      if (!method) return;
      if (!commitEntryIfNeeded()) return;
      call(method);
    }

    keypad.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      const digit = button.dataset.digit;
      if (digit !== undefined) {
        entryBuffer += digit;
        syncEntry();
        return;
      }
      handleAction(button.dataset.action);
    });

    pushABtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      pushMatrixFromTextarea(matrixAInput);
    });

    pushBBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      pushMatrixFromTextarea(matrixBInput);
    });

    solveBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      handleAction("solve");
    });

    presetABtn.addEventListener("click", () => {
      matrixAInput.value = "1 2\n3 4";
      setError("");
    });

    presetBBtn.addEventListener("click", () => {
      matrixBInput.value = "5\n6";
      setError("");
    });

    pushIdentityBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      pushIdentityFromInput();
    });

    pushComplexBtn.addEventListener("click", () => {
      if (!wasmCalc) return;
      pushComplexFromInputs();
    });

    window.addEventListener("keydown", (event) => {
      if (!wasmCalc) return;
      if (event.key >= "0" && event.key <= "9") {
        entryBuffer += event.key;
        syncEntry();
        return;
      }
      if (event.key === ".") {
        handleAction("decimal");
        return;
      }
      if (event.key === "Backspace") {
        event.preventDefault();
        handleAction("backspace");
        return;
      }
      if (event.key === "Enter") {
        event.preventDefault();
        handleAction("enter");
        return;
      }
      const keyOps = { "+": "add", "-": "sub", "*": "mul", "/": "div" };
      if (keyOps[event.key]) {
        event.preventDefault();
        handleAction(keyOps[event.key]);
      }
    });

    async function boot() {
      try {
        if (typeof wasm_bindgen !== "function") {
          throw new Error("wasm_bindgen runtime is unavailable");
        }

        if (typeof window.__WASM_BASE64 === "string" && window.__WASM_BASE64.length > 0) {
          await wasm_bindgen(decodeBase64ToBytes(window.__WASM_BASE64));
        } else {
          await wasm_bindgen("./pkg/webcalculator_backend_bg.wasm");
        }

        wasmCalc = new wasm_bindgen.WasmCalculator();
        runtimeHint.textContent = "WASM runtime loaded.";
        const initial = JSON.parse(wasmCalc.snapshot_json());
        renderState(initial);
        setError("");
      } catch (error) {
        runtimeHint.textContent =
          "WASM runtime not found. Build with ./scripts/build_wasm.sh and open dist/index.html.";
        setError("runtime unavailable");
        console.error(error);
        for (const button of document.querySelectorAll("button")) {
          button.disabled = true;
        }
      }
    }

    boot();
  </script>
</body>
</html>
